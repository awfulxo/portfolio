<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        .concept-item {
            width: 400px;
            height: 225px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease-in-out;
            cursor: pointer;
        }

            .concept-item:hover {
                transform: scale(1.05);
            }

        /* Модальное окно */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.3s ease;
        }

        .modal-content {
            width: 80%;
            height: 50%;
            object-fit: contain;
            border-radius: 10px;
        }

        .close {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 30px;
            color: white;
            cursor: pointer;
            z-index: 2000;
        }
        .video-container {
            position: relative;
            display: inline-block;
        }

        .video-menu {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            opacity: 0;
            visibility: hidden;
        }

        .video-container:hover .video-menu {
            opacity: 1;
            visibility: visible;
        }

    </style>
</head>
<body class="concept-page">
    <a href="index.html" class="back-link">M U K A I</a>
    <h1 class="concept-title">Animation</h1>
    <div class="concept-gallery" id="gallery"></div>

    <div id="modal" class="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <video class="modal-content" id="modal-video" controls onclick="closeModal()">
            Ваш браузер не поддерживает видео.
        </video>
    </div>

    <script>
        function getYouTubeId(url) {
            const match = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([\w-]{11})/);
            return match ? match[1] : null;
        }

        fetch("data/animation.json?v=" + Date.now(), { cache: "no-store" })
            .then(res => res.json())
            .then(data => {
                const gallery = document.getElementById("gallery");
                gallery.innerHTML = data.items
                    .map(item => typeof item === "string" ? { src: item } : item)
                    .filter(item => item.src)
                    .map(item => {
                        const style = item.size ? ` style="width:${item.size}px"` : "";
                        const youtubeId = getYouTubeId(item.src);
                        if (youtubeId) {
                            return `
                                <iframe class="concept-item"${style} src="https://www.youtube.com/embed/${youtubeId}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                            `;
                        }
                        return `
                            <video class="concept-item"${style} controls preload="auto" muted loop autoplay onclick="openModal(this)">
                                <source src="${item.src}" type="video/mp4">
                                Ваш браузер не поддерживает видео.
                            </video>
                        `;
                    }).join("");
            });

        // Открытие модального окна с видео
        function openModal(videoElement) {
            console.log("Нажато на видео: ", videoElement.src);  // Лог для проверки
            var modalVideo = document.getElementById("modal-video");

            // Устанавливаем видео в модальном окне
            modalVideo.src = videoElement.src;

            // Ожидаем, пока видео загрузится
            modalVideo.addEventListener('loadeddata', function () {
                console.log("Видео загружено и готово к воспроизведению"); // Лог для проверки
                document.getElementById("modal").style.display = "flex"; // Показываем модальное окно
                modalVideo.play(); // Запускаем видео
            }, { once: true });

            modalVideo.addEventListener('error', function () {
                console.log("Ошибка при загрузке видео."); // Лог для ошибки
            });
        }

        // Закрытие модального окна
        function closeModal() {
            var modalVideo = document.getElementById("modal-video");
            modalVideo.pause(); // Ставим на паузу
            modalVideo.currentTime = 0; // Сбрасываем время
            document.getElementById("modal").style.display = "none"; // Закрываем модалку
        }

       
    </script>
</body>
</html>
